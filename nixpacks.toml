[phases.setup]
cmds = ["apt-get update && apt-get install -y default-mysql-client"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install && npm run build",
  "php artisan key:generate --force"
]

[start]
cmd = "php artisan migrate:fresh --seed --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host 0.0.0.0 --port $PORT"
